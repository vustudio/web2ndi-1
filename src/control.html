<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>webcg-ndi control</title>
<style>
  :root { --bg:#0e0e12; --panel:#1c1c22; --edge:#333; --fg:#ddd; --mut:#888; --accent:#66f; --ok:#0c7; --warn:#e74; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.4 system-ui,Segoe UI,Roboto,sans-serif; }
  header { padding:14px 20px; background:#08080b; border-bottom:1px solid var(--edge); display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:5; }
  header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; }
  header .meta { color:var(--mut); font-size:12px; }
  header button { margin-left:auto; }
  .stats { display:flex; gap:7px; margin-left:16px; flex-wrap:wrap; }
  .pill { background:#161620; border:1px solid var(--edge); border-radius:20px; padding:3px 10px; font-size:12px; white-space:nowrap; }
  .pill b { color:var(--accent); }
  main { max-width:1200px; margin:0 auto; padding:20px; display:grid; gap:18px; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); }
  .card { background:var(--panel); border:1px solid var(--edge); border-radius:8px; padding:14px; }
  .card h2 { font-size:13px; margin:0 0 4px; display:flex; align-items:center; gap:8px; }
  .card .sub { color:var(--mut); font-size:11px; margin-bottom:10px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--warn); flex:0 0 auto; }
  .dot.on { background:var(--ok); }
  .pstat { margin:2px 0 10px; display:flex; align-items:center; gap:8px; min-height:26px; flex-wrap:wrap; }
  .badge { font-size:11px; padding:2px 9px; border-radius:12px; }
  .badge.unlic { background:#3a2a10; color:#fb0; border:1px solid #740; }
  .badge.lic { background:#10331f; color:#5e9; border:1px solid #363; }
  .pidwrap { font-size:12px; color:var(--mut); }
  .pid { font-size:19px; font-weight:700; letter-spacing:1.5px; color:#fff; user-select:all; cursor:pointer; padding:1px 6px; border-radius:5px; background:#0b0b0f; border:1px solid var(--edge); }
  .pid:hover { border-color:var(--accent); }
  .preview { width:100%; border-radius:6px; border:1px solid var(--edge); background:#000; display:block; aspect-ratio:16/9; object-fit:contain; margin-bottom:10px; }
  label { display:block; font-size:11px; color:var(--mut); margin:8px 0 3px; }
  input[type=text],input[type=number],select { width:100%; padding:7px 9px; background:#0b0b0f; border:1px solid var(--edge); border-radius:6px; color:var(--fg); font-size:13px; }
  .row { display:flex; gap:8px; } .row>*{ flex:1; }
  button { padding:7px 11px; background:#2a2a34; color:var(--fg); border:1px solid var(--edge); border-radius:6px; cursor:pointer; font-size:12px; }
  button:hover { background:#33333f; }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.danger { background:#3a2020; border-color:#663; color:#e99; }
  .btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .chk { display:flex; align-items:center; gap:7px; margin-top:10px; } .chk input{ width:auto; }
  .msg { min-height:15px; font-size:11px; color:var(--ok); margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>webcg-ndi</h1>
  <span class="meta" id="meta"></span>
  <span class="stats" id="sys"></span>
  <button class="primary" onclick="addChannel()">+ Add channel</button>
</header>
<main id="grid"></main>

<script>
let statusCache = [];
async function refresh() {
  try {
    const s = await (await fetch('status')).json();
    document.getElementById('meta').textContent = s.machineName + '  ·  gl=' + s.gl + '  ·  ' + s.channels.length + ' channel(s)';
    const sy = s.system || {}, pills = [];
    pills.push(`<span class="pill">CPU <b>${sy.cpuPercent || 0}%</b> (~${((sy.cpuPercent || 0) / 100).toFixed(1)} cores)</span>`);
    pills.push(`<span class="pill">MEM <b>${sy.memMB || 0}</b> MB</span>`);
    for (const g of (sy.gpus || [])) pills.push(`<span class="pill">GPU${g.index} <b>${g.util}%</b> ${(g.memUsed / 1024).toFixed(1)}/${(g.memTotal / 1024).toFixed(0)}GB</span>`);
    document.getElementById('sys').innerHTML = pills.join('');
    statusCache = s.channels;
    render(s);
  } catch (e) {}
}
function render(s) {
  const grid = document.getElementById('grid');
  // remove cards for deleted channels
  [...grid.children].forEach(c => { if (!s.channels.find(ch => ch.id === c.dataset.id)) c.remove(); });
  for (const ch of s.channels) {
    let card = grid.querySelector('[data-id="' + ch.id + '"]');
    if (!card) { card = buildCard(ch); grid.appendChild(card); }
    updateCard(card, ch);
  }
}
function buildCard(ch) {
  const c = document.createElement('div'); c.className = 'card'; c.dataset.id = ch.id;
  c.innerHTML = `
    <h2><span class="dot"></span> <span class="nm"></span> <span style="color:var(--mut);font-weight:400">(${ch.id})</span></h2>
    <div class="sub"></div>
    <div class="pstat"></div>
    <img class="preview" alt="preview">
    <label>Source URL (live)</label>
    <input type="text" class="f_url">
    <div class="btns"><button class="primary" data-a="url">Set URL</button><button data-a="reload">Reload</button></div>
    <div class="row" style="margin-top:8px">
      <div><label>Resolution</label><select class="f_res">
        <option value="1280x720">720p (1280×720)</option>
        <option value="1920x1080">1080p (1920×1080)</option>
        <option value="2560x1440">1440p (2560×1440)</option>
        <option value="3840x2160">4K (3840×2160)</option>
      </select></div>
      <div><label>Frame rate</label><select class="f_fps">
        <option value="24">24 fps</option>
        <option value="25">25 fps</option>
        <option value="30">30 fps</option>
        <option value="50">50 fps</option>
        <option value="60">60 fps</option>
      </select></div>
    </div>
    <label>NDI name</label><input type="text" class="f_name">
    <div class="chk"><input type="checkbox" class="f_alpha"><label style="margin:0">Alpha (fill+key)</label></div>
    <div class="btns"><button class="primary" data-a="config">Apply &amp; restart</button><button class="danger" data-a="delete">Delete</button></div>
    <div class="msg"></div>`;
  const id = ch.id, msg = c.querySelector('.msg');
  const val = s => c.querySelector(s).value;
  c.querySelector('[data-a="url"]').onclick = async () => { await post('channels/'+id+'/url', {url: val('.f_url')}); msg.textContent='URL set.'; };
  c.querySelector('[data-a="reload"]').onclick = async () => { await post('channels/'+id+'/reload'); msg.textContent='reloaded.'; };
  c.querySelector('[data-a="config"]').onclick = async () => {
    const [w, h] = c.querySelector('.f_res').value.split('x').map(Number);
    msg.textContent='restarting…';
    await post('channels/'+id, { width:w, height:h, fps:+c.querySelector('.f_fps').value, name:val('.f_name'), alpha:c.querySelector('.f_alpha').checked });
    msg.textContent='applied.';
  };
  c.querySelector('[data-a="delete"]').onclick = async () => { if (confirm('Delete '+id+'?')) { await post('channels/'+id+'/delete'); c.remove(); } };
  return c;
}
function updateCard(c, ch) {
  c.querySelector('.dot').classList.toggle('on', ch.connected);
  c.querySelector('.nm').textContent = ch.name;
  c.querySelector('.sub').textContent = ch.width + '×' + ch.height + '@' + ch.fps + '  ·  actual ' + ch.fpsActual + ' fps  ·  ' + (ch.alpha?'alpha':'opaque');
  const p = ch.page || {}, ps = c.querySelector('.pstat');
  if (p.playerId) {
    const badge = p.licensed ? '<span class="badge lic">Licensed</span>' : '<span class="badge unlic">Unlicensed</span>';
    const nm = p.playerName ? '<span class="pidwrap">' + p.playerName + '</span>' : '';
    ps.innerHTML = badge + nm + '<span class="pid" title="click to copy">' + p.playerId + '</span>';
    const pid = ps.querySelector('.pid');
    pid.onclick = () => { const v = p.playerId;
      const done = () => { pid.textContent = 'copied'; setTimeout(() => pid.textContent = v, 800); };
      if (navigator.clipboard) navigator.clipboard.writeText(v).then(done).catch(() => {});
      else { const ta = document.createElement('textarea'); ta.value = v; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); done(); } catch (e) {} ta.remove(); }
    };
  } else if (p.connected === true) { ps.innerHTML = '<span class="badge lic">Connected</span>'; }
  else { ps.innerHTML = ''; }
  const a = document.activeElement, has = s => c.contains(a) && a.classList.contains(s.slice(1));
  if (!has('.f_url'))  c.querySelector('.f_url').value = ch.url;
  if (!has('.f_res'))  setSelect(c.querySelector('.f_res'), ch.width + 'x' + ch.height, ch.width + '×' + ch.height + ' (custom)');
  if (!has('.f_fps'))  setSelect(c.querySelector('.f_fps'), String(ch.fps), ch.fps + ' fps (custom)');
  if (!has('.f_name')) c.querySelector('.f_name').value = ch.name;
  if (a !== c.querySelector('.f_alpha')) c.querySelector('.f_alpha').checked = ch.alpha;
  c.querySelector('.preview').src = 'preview.jpg?id=' + ch.id + '&t=' + Date.now();
}
async function post(path, body) {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{}) });
  return r.ok;
}
function setSelect(sel, value, customLabel) {
  if (![...sel.options].some(o => o.value === value)) {
    const o = document.createElement('option'); o.value = value; o.textContent = customLabel || value; sel.appendChild(o);
  }
  sel.value = value;
}
async function addChannel() {
  const url = prompt('Page URL for the new channel:', 'https://example.com');
  if (!url) return;
  const name = prompt('NDI name:', 'WebCG-' + (statusCache.length + 1));
  if (!name) return;
  await post('channels', { url, name, width:1920, height:1080, fps:30, alpha:true });
  refresh();
}
setInterval(refresh, 2000); refresh();
</script>
</body>
</html>
