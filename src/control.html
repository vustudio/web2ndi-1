<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>webcg · ndi</title>
<link rel="stylesheet" href="/tg/tokens.css">
<link rel="stylesheet" href="/tg/components.css">
<style>
/* ============================================================================
   Page chrome only. Every colour is a Terminal Grid --tg-* token; component
   styling comes from components.css. The aurora/grid backdrop is reproduced
   from the Terminal Grid landing page (its named hues declared once below).
   ========================================================================== */
:root{
  /* aurora hues — declared once here (not inlined at point-of-use); the violet
     and mint are the Terminal Grid landing-page backdrop hues, the blue reuses
     the accent token. */
  --aura-blue: var(--tg-accent-rgb);
  --aura-violet: 139, 92, 246;
  --aura-mint: 16, 185, 129;
}
*{margin:0; padding:0; box-sizing:border-box}
html,body{min-height:100%}
body{
  font-family:var(--tg-font); color:var(--tg-fg);
  background:#0f0f12;                       /* base canvas (matches TG landing) */
  -webkit-font-smoothing:antialiased;
  padding:24px 20px 80px; position:relative; overflow-x:hidden;
}
/* animated aurora — verbatim behaviour from Terminal Grid index.html */
body::before{
  content:''; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(var(--aura-blue), .12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(var(--aura-violet), .10) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(var(--aura-mint), .06) 0%, transparent 60%);
  animation:aurora 18s ease-in-out infinite alternate;
}
@keyframes aurora{
  0%{transform:translate(0,0) scale(1)} 33%{transform:translate(2%,-2%) scale(1.05)}
  66%{transform:translate(-1%,1%) scale(.98)} 100%{transform:translate(1%,-1%) scale(1.02)}
}
body::after{
  content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size:60px 60px;
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 30%, black 30%, transparent 80%);
  mask-image:radial-gradient(ellipse 70% 60% at 50% 30%, black 30%, transparent 80%);
}
@media (max-width:600px){ body::before{opacity:.15} }

/* Block flow (not a flex column): tg-header centres itself via its own
   max-width + margin:0 auto, which an auto cross-margin in a flex column would
   otherwise collapse to content width. */
.wrap{max-width:1400px; margin:0 auto}
tg-header{display:block}

/* ── telemetry strip (no meter component exists in TG — built from tokens) ── */
.telemetry{
  display:flex; flex-wrap:wrap; gap:22px; align-items:center; margin-bottom:16px;
  background:var(--tg-glass-bg); border:1px solid var(--tg-glass-border);
  border-radius:var(--tg-radius-xl); padding:14px 20px;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
.tel{display:flex; flex-direction:column; gap:4px; min-width:76px}
.tel-k{font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; opacity:.5; color:var(--tg-link-fg)}
.tel-v{font-family:var(--tg-font-mono); font-size:13px; font-weight:600; opacity:.85; font-variant-numeric:tabular-nums}
.tel-v i{font-style:normal; opacity:.45; font-size:11px}
.meter{display:block; height:2px; border-radius:var(--tg-radius-xs); background:var(--tg-surface-sunken); overflow:hidden}
.meter>i{display:block; height:100%; background:rgba(var(--tg-accent-strong-rgb),.6); transition:width .28s ease}
.meter.hot>i{background:rgba(var(--tg-warn-rgb),.7)}

/* ── channel grid ── */
.grid{display:grid; gap:16px; grid-template-columns:repeat(auto-fill, minmax(min(100%,420px),1fr))}
.ch-card{position:relative; overflow:hidden}
/* tally rail — states expressed only through signal tokens */
.rail{position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:var(--tg-radius-xl) 0 0 var(--tg-radius-xl);
  background:var(--tg-border-4); transition:background .28s, box-shadow .28s}
.rail[data-state="live"]{background:rgba(var(--tg-accent-glow-rgb),.7); box-shadow:0 0 14px -2px rgba(var(--tg-accent-glow-rgb),.5)}
.rail[data-state="pvw"]{background:rgba(var(--tg-success-rgb),.8); box-shadow:0 0 14px -2px rgba(var(--tg-success-rgb),.5)}
.rail[data-state="pgm"]{background:rgba(var(--tg-danger-rgb),.9); box-shadow:0 0 16px 0 rgba(var(--tg-danger-rgb),.6); animation:tally 1.6s ease-in-out infinite}
@keyframes tally{0%,100%{opacity:1}50%{opacity:.55}}
.ch-card.onair{border-color:rgba(var(--tg-danger-rgb),.4)}

.ch-head{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px}
.ch-tag{font-family:var(--tg-font-mono); font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
  color:var(--tg-fg); opacity:.85; background:var(--tg-surface-3); border:1px solid var(--tg-border-4);
  border-radius:var(--tg-radius-sm); padding:2px 7px}
.ch-name{font-size:16px; font-weight:700; letter-spacing:-.2px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
/* player-state badge — a non-interactive status pill (no TG status-badge
   component exists); shares .stab's chip recipe but adds semantic signal colours */
.badge{font-family:var(--tg-font-mono); font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
  padding:3px 8px; border-radius:var(--tg-radius); border:1px solid var(--tg-border-4);
  background:var(--tg-surface-2); color:var(--tg-fg); opacity:.6}
.badge[data-s="licensed"]{opacity:1; color:rgb(var(--tg-success-rgb)); background:rgba(var(--tg-success-rgb),.12); border-color:rgba(var(--tg-success-rgb),.35)}
.badge[data-s="unlicensed"]{opacity:1; color:rgb(var(--tg-warn-rgb)); background:rgba(var(--tg-warn-rgb),.12); border-color:rgba(var(--tg-warn-rgb),.35)}
.badge[data-s="blocked"]{opacity:1; color:rgb(var(--tg-danger-rgb)); background:rgba(var(--tg-danger-rgb),.12); border-color:rgba(var(--tg-danger-rgb),.35)}

.ident{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:12px; min-height:22px}
.pid{font-family:var(--tg-font-mono); font-size:13px; font-weight:600; letter-spacing:.4px; color:var(--tg-fg);
  background:var(--tg-surface-sunken); border:1px solid var(--tg-border-4); border-radius:var(--tg-radius); padding:2px 8px; cursor:pointer; user-select:all}
.pid:hover{border-color:var(--tg-border-8)}
.ident .warn{font-size:11px; opacity:.6; color:rgb(var(--tg-warn-rgb))}

/* preview screen — sunken surface token */
.screen{position:relative; margin-bottom:12px; border-radius:var(--tg-radius-md); overflow:hidden;
  background:var(--tg-surface-sunken); border:1px solid var(--tg-border-3); aspect-ratio:16/9}
.screen img{width:100%; height:100%; object-fit:contain; display:block}

/* mono data readout */
.data{display:flex; flex-wrap:wrap; gap:2px 16px; font-family:var(--tg-font-mono); font-size:11px; opacity:.7;
  padding:8px 0; border-top:1px solid var(--tg-border-2); border-bottom:1px solid var(--tg-border-2); margin-bottom:12px}
.data b{opacity:1; font-weight:600; color:var(--tg-fg)}
.data .em{color:var(--tg-link-fg)}
.data .dim{opacity:.5}

.field{display:block; font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; opacity:.5;
  color:var(--tg-link-fg); margin:0 0 5px}
.row{display:flex; gap:8px; flex-wrap:wrap}
.row>*{flex:1 1 130px; min-width:0}
.acts{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
.acts>*{flex:1 1 auto}
.sep{height:1px; background:var(--tg-border-2); margin:14px 0}
.sw{display:flex; align-items:center; gap:8px; margin-top:12px}
.msg{min-height:14px; font-family:var(--tg-font-mono); font-size:10px; margin-top:8px; color:rgb(var(--tg-success-rgb)); opacity:.9}
.msg.err{color:rgb(var(--tg-warn-rgb))}
tg-button{display:block}
.acts tg-button{flex:1 1 auto}

/* Keyboard focus: the library sets outline:none on .glass-btn/.glass-select with
   no :focus-visible replacement, so restore a token-coloured ring at page level. */
.glass-btn:focus-visible, .glass-select:focus-visible,
.stab:focus-visible, .pid:focus-visible{
  outline:2px solid var(--tg-focus); outline-offset:1px; border-radius:var(--tg-radius-sm);
}

@media (max-width:520px){ .row>*{flex-basis:100%} body{padding:16px 12px 60px} }
@media (prefers-reduced-motion:reduce){ *,*::before,*::after{animation:none!important; transition-duration:1ms!important} }
</style>
</head>
<body>
<div class="wrap">
  <tg-header title="webcg · ndi" subtitle="loading…" show-nav>
    <a href="#" id="navAdd">+ Channel</a>
    <a href="#" id="navName">System name</a>
    <a href="/docs" target="_blank" rel="noreferrer">API docs</a>
  </tg-header>

  <div class="telemetry" id="telemetry"></div>

  <main class="grid" id="grid"></main>
</div>

<script type="module">
import '/tg/index.js';

let cache = [];

/* ── data ── */
async function refresh(){
  try{
    const s = await (await fetch('status')).json();
    const hdr = document.querySelector('tg-header');
    if (hdr){
      // Update the subtitle text node in place. Never setAttribute('subtitle') —
      // that re-renders tg-header and wipes the nav links (and their listeners),
      // since by then the <a>s live inside .tg-header-nav, not as direct children.
      const sub = hdr.querySelector('.tg-header-subtitle');
      if (sub) sub.textContent = `${s.machineName} · ${s.gl} · ${s.channels.length} channel${s.channels.length===1?'':'s'}`;
    }
    renderTelemetry(s.system || {});
    cache = s.channels;
    renderGrid(s);
  }catch(e){}
}

function meter(pct, hot){
  return `<span class="meter${hot?' hot':''}"><i style="width:${Math.max(0,Math.min(100,pct))}%"></i></span>`;
}
function renderTelemetry(sy){
  const cores = (sy.cpuPercent||0)/100, nCores = sy.cores||1;
  const net = sy.net||{}, ndi = sy.ndiTotalMbps||0;
  const parts = [];
  parts.push(`<div class="tel"><span class="tel-k">CPU</span><span class="tel-v">${cores.toFixed(1)}<i>/${nCores}</i></span>${meter(cores/nCores*100)}</div>`);
  parts.push(`<div class="tel"><span class="tel-k">Memory</span><span class="tel-v">${sy.memMB||0}<i>MB</i></span>${meter((sy.memMB||0)/8000*100)}</div>`);
  for(const g of (sy.gpus||[]))
    parts.push(`<div class="tel"><span class="tel-k">GPU${g.index}</span><span class="tel-v">${g.util}<i>%</i></span>${meter(g.util)}</div>`);
  parts.push(`<div class="tel"><span class="tel-k">NDI out</span><span class="tel-v">${ndi}<i>Mb/s</i></span>${meter(ndi/10000*100, ndi>7000)}</div>`);
  parts.push(`<div class="tel"><span class="tel-k">NIC tx</span><span class="tel-v">${Math.round(net.txMbps||0)}<i>Mb/s</i></span>${meter((net.txMbps||0)/10000*100)}</div>`);
  document.getElementById('telemetry').innerHTML = parts.join('');
}

function renderGrid(s){
  const grid = document.getElementById('grid');
  [...grid.children].forEach(c=>{ if(!s.channels.find(ch=>ch.id===c.dataset.id)) c.remove(); });
  for(const ch of s.channels){
    let el = grid.querySelector('[data-id="'+ch.id+'"]');
    if(!el){ el = buildCard(ch); grid.appendChild(el); }
    updateCard(el, ch);
  }
}

/* ── card (uses the .glass-card class directly so live updates don't trip the
      custom element's one-shot render; all controls are TG components/classes) ── */
function buildCard(ch){
  const el = document.createElement('div');
  el.className = 'glass-card ch-card'; el.dataset.id = ch.id;
  el.innerHTML = `
    <span class="rail" data-state="off"></span>
    <div class="ch-head">
      <span class="ch-tag">${ch.id}</span>
      <span class="ch-name"></span>
      <span class="badge" data-s="">—</span>
    </div>
    <div class="ident"></div>
    <div class="screen"><img alt="channel preview"></div>
    <div class="data"></div>

    <label class="field">Source URL — applies live</label>
    <div class="row">
      <input class="glass-input f_url" style="flex:3 1 200px" placeholder="https://…">
      <tg-button data-a="url" variant="primary" icon="→" style="flex:1 1 90px">Set</tg-button>
    </div>
    <div class="acts">
      <tg-button data-a="reload" icon="↻">Reload</tg-button>
      <tg-button data-a="click" icon="◉">Click centre</tg-button>
    </div>

    <div class="sep"></div>

    <div class="row">
      <div><label class="field">Resolution</label>
        <select class="glass-select f_res">
          <option value="1280x720">720p · 1280×720</option>
          <option value="1920x1080">1080p · 1920×1080</option>
          <option value="2560x1440">1440p · 2560×1440</option>
          <option value="3840x2160">4K · 3840×2160</option>
        </select>
      </div>
      <div><label class="field">Frame rate</label>
        <select class="glass-select f_fps">
          <option value="24">24 fps</option><option value="25">25 fps</option>
          <option value="30">30 fps</option><option value="50">50 fps</option>
          <option value="60">60 fps</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <div><label class="field">NDI name</label><input class="glass-input f_name"></div>
    </div>
    <div class="sw"><tg-checkbox class="f_alpha" label="Alpha — fill + key"></tg-checkbox></div>

    <div class="acts">
      <tg-button data-a="apply" variant="primary" icon="✓">Apply &amp; restart</tg-button>
      <tg-button data-a="del" icon="✕">Delete</tg-button>
    </div>
    <div class="msg"></div>`;

  const id = ch.id, msg = el.querySelector('.msg');
  const val = sel => el.querySelector(sel).value;

  // delegated tg-button clicks
  el.addEventListener('tg-click', async (e)=>{
    const btn = e.target.closest('tg-button'); if(!btn) return;
    const a = btn.dataset.a;
    if(a==='url'){ await post('channels/'+id+'/url',{url:val('.f_url')}); say(msg,'URL set.'); }
    else if(a==='reload'){ await post('channels/'+id+'/reload'); say(msg,'Reloaded.'); }
    else if(a==='click'){ await post('channels/'+id+'/input',{type:'click'}); say(msg,'Click injected at centre.'); }
    else if(a==='del'){ if(confirm('Delete '+id+'? Its NDI output stops immediately.')){ await post('channels/'+id+'/delete'); el.remove(); } }
    else if(a==='apply'){
      const [w,h] = val('.f_res').split('x').map(Number);
      say(msg,'Restarting…');
      await post('channels/'+id, {width:w,height:h,fps:+val('.f_fps'),name:val('.f_name'),
        alpha:el.querySelector('.f_alpha').checked});
      say(msg,'Applied.');
    }
  });
  return el;
}

function say(el,text,isErr){ el.className='msg'+(isErr?' err':''); el.textContent=text;
  clearTimeout(el._t); el._t=setTimeout(()=>{ el.textContent=''; },3000); }

function updateCard(el, ch){
  const p = ch.page||{}, t = ch.tally||{};
  const onair = !!t.program;

  const rail = el.querySelector('.rail');
  rail.dataset.state = onair ? 'pgm' : (t.preview ? 'pvw' : (ch.conn>0 ? 'live' : 'off'));
  rail.title = onair ? 'On program' : (t.preview ? 'On preview' : (ch.conn>0 ? ch.conn+' receiver(s)' : 'No receivers'));
  el.classList.toggle('onair', onair);
  el.querySelector('.ch-name').textContent = ch.name;

  const badge = el.querySelector('.badge'), ident = el.querySelector('.ident');
  let origin = safeOrigin(p.origin||''); if(!origin){ try{ origin = safeOrigin(new URL(ch.url).origin); }catch(e){} }
  const st = p.state;
  const bid = (p.blocked&&p.blocked.id)||p.playerId||'';

  // Rebuild the identity/action row only when its state signature changes, so a
  // 2s poll doesn't clobber in-flight chip feedback ('…'→'Sent', 'Copied').
  const sig = [st, p.playerId||'', p.playerName||'', origin, bid].join('|');
  if(el._identSig !== sig){
    el._identSig = sig;
    if(st==='blocked'){
      badge.dataset.s='blocked'; badge.textContent='Blocked';
      ident.innerHTML=(bid?`<span class="pid">${esc(bid)}</span>`:'')
        +`<span class="warn">ID in use in another browser</span>`
        +`<button class="stab" data-c="retry connection">Retry</button>`
        +`<button class="stab" data-c="start as unlicensed">Start unlicensed</button>`;
    } else if(st==='licensed' && p.playerId){
      badge.dataset.s='licensed'; badge.textContent='Licensed';
      const url=origin+'/library?id='+encodeURIComponent(p.playerId);
      ident.innerHTML=(p.playerName?`<span class="ch-tag">${esc(p.playerName)}</span>`:'')
        +`<span class="pid" title="click to copy">${esc(p.playerId)}</span>`
        +(origin?`<a class="stab" href="${esc(url)}" target="_blank" rel="noreferrer">Open library</a>`:'')
        +(origin?`<button class="stab" data-copy="${esc(url)}">Copy link</button>`:'');
    } else if(st==='unlicensed' && p.playerId){
      badge.dataset.s='unlicensed'; badge.textContent='Unlicensed';
      const url=origin+'/player-admin/setup/'+encodeURIComponent(p.playerId);
      ident.innerHTML=`<span class="pid" title="click to copy">${esc(p.playerId)}</span>`
        +(origin?`<a class="stab" href="${esc(url)}" target="_blank" rel="noreferrer">Register player</a>`:'')
        +(origin?`<button class="stab" data-copy="${esc(url)}">Copy link</button>`:'');
    } else if(st==='connecting'){
      badge.dataset.s=''; badge.textContent='Connecting';
      ident.innerHTML=`<span class="warn" style="opacity:.5">Waiting for the player to connect</span>`;
    } else { badge.dataset.s=''; badge.textContent='—'; ident.innerHTML=''; }

    const pid = ident.querySelector('.pid');
    if(pid) pid.onclick=()=>copyText(pid.textContent,pid);
    ident.querySelectorAll('[data-copy]').forEach(b=>{ b.onclick=()=>copyText(b.dataset.copy,b,'Copy link'); });
    ident.querySelectorAll('[data-c]').forEach(b=>{ b.onclick=async()=>{
      const o=b.textContent; b.textContent='…';
      const r=await fetch('channels/'+ch.id+'/click',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({label:b.dataset.c})});
      let j={}; try{ j=await r.json(); }catch(e){}
      b.textContent=j.clicked?'Sent':'Not found'; setTimeout(()=>b.textContent=o,1400);
    };});
  }

  const throttled = ch.targetFps && ch.targetFps < ch.fps;
  const bw = ch.conn>0
    ? `<span><b class="em">${ch.ndiOutMbps}</b> Mb/s <span class="dim">· ${ch.conn} rcv</span></span>`
    : `<span class="dim">idle · 0 Mb/s (${ch.ndiPerStreamMbps} if watched)</span>`;
  el.querySelector('.data').innerHTML =
      `<span><b>${ch.width}</b>×<b>${ch.height}</b></span>`
    + `<span><b>${ch.fpsSent}</b> fps ${throttled?`<span class="dim">· adaptive ${ch.targetFps}</span>`:`<span class="dim">/ ${ch.fps}</span>`}</span>`
    + bw
    + `<span class="dim">${ch.alpha?'BGRA · alpha':'BGRX · opaque'}</span>`;

  const img = el.querySelector('.screen img');
  img.src = 'preview.jpg?id='+ch.id+'&t='+Date.now();

  // never clobber a field the operator is editing
  const a = document.activeElement, editing = s => el.contains(a) && a.classList.contains(s.slice(1));
  if(!editing('.f_url'))  el.querySelector('.f_url').value = ch.url;
  if(!editing('.f_name')) el.querySelector('.f_name').value = ch.name;
  if(!editing('.f_res'))  setSelect(el.querySelector('.f_res'), ch.width+'x'+ch.height, ch.width+'×'+ch.height);
  if(!editing('.f_fps'))  setSelect(el.querySelector('.f_fps'), String(ch.fps), ch.fps+' fps');
  const alpha = el.querySelector('.f_alpha');
  if(alpha && document.activeElement!==alpha && alpha.checked!==!!ch.alpha) alpha.checked = !!ch.alpha;
}

/* ── helpers ── */
// The rendered page is operator-controlled and untrusted, so every page-derived
// string interpolated into innerHTML is escaped, and link origins are validated
// to be http(s) before use in an href.
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safeOrigin(o){ return /^https?:\/\//i.test(o||'') ? o : ''; }
async function post(path, body){
  const r = await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
  return r.ok;
}
function copyText(v, el, restore){
  const orig = restore || (el.textContent);
  const done = ()=>{ el.textContent='Copied'; setTimeout(()=>el.textContent=orig,900); };
  if(navigator.clipboard) navigator.clipboard.writeText(v).then(done).catch(()=>{});
  else { const ta=document.createElement('textarea'); ta.value=v; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); done(); }catch(e){} ta.remove(); }
}
function setSelect(sel, value, customLabel){
  if(![...sel.options].some(o=>o.value===value)){
    const o=document.createElement('option'); o.value=value; o.textContent=(customLabel||value)+' · custom'; sel.appendChild(o);
  }
  sel.value = value;
}
async function addChannel(){
  const url = prompt('Page URL for the new channel:','https://example.com'); if(!url) return;
  const name = prompt('NDI name:','WebCG-'+(cache.length+1)); if(!name) return;
  await post('channels',{url,name,width:1920,height:1080,fps:30,alpha:false});
  refresh();
}
/* NDI system name — the "MACHINE" half of every source; libndi latches it at
   startup, so a change needs an engine restart. */
async function editSystemName(){
  let cur={machineName:'',active:''};
  try{ cur = await (await fetch('settings')).json(); }catch(e){}
  const name = prompt(`NDI system name — the prefix on every source, e.g. "${cur.active||'TOWER'} (CG-1)".\nLeave blank to use the host name.`, cur.machineName||'');
  if(name===null) return;
  await post('settings',{machineName:name});
  if(confirm('Saved. Restart the engine now to apply it?\n\nAll NDI outputs blip for a few seconds.')) await post('restart');
}

document.getElementById('navAdd').addEventListener('click', e=>{ e.preventDefault(); addChannel(); });
document.getElementById('navName').addEventListener('click', e=>{ e.preventDefault(); editSystemName(); });

setInterval(refresh, 2000); refresh();
</script>
</body>
</html>
