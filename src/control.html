<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>webcg-ndi control</title>
<style>
  :root { --bg:#0e0e12; --panel:#1c1c22; --edge:#333; --fg:#ddd; --mut:#888; --accent:#66f; --ok:#0c7; --warn:#e74; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.4 system-ui,Segoe UI,Roboto,sans-serif; }
  header { padding:14px 20px; background:#08080b; border-bottom:1px solid var(--edge); display:flex; align-items:center; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:5; }
  header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; }
  header .meta { color:var(--mut); font-size:12px; }
  header button { margin-left:auto; }
  .stats { display:flex; gap:7px; margin-left:16px; flex-wrap:wrap; }
  .pill { background:#161620; border:1px solid var(--edge); border-radius:20px; padding:3px 10px; font-size:12px; white-space:nowrap; }
  .pill b { color:var(--accent); }
  main { max-width:1200px; margin:0 auto; padding:20px; display:grid; gap:18px; grid-template-columns:repeat(auto-fill,minmax(min(100%,380px),1fr)); }
  .card { background:var(--panel); border:1px solid var(--edge); border-radius:8px; padding:14px; }
  .card h2 { font-size:13px; margin:0 0 4px; display:flex; align-items:center; gap:8px; }
  .card .sub { color:var(--mut); font-size:11px; margin-bottom:10px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--warn); flex:0 0 auto; }
  .dot.on { background:var(--ok); }
  .pstat { margin:2px 0 10px; display:flex; align-items:center; gap:8px; min-height:26px; flex-wrap:wrap; }
  .badge { font-size:11px; padding:2px 9px; border-radius:12px; background:#22222c; color:var(--mut); border:1px solid var(--edge); }
  .badge.unlic { background:#3a2a10; color:#fb0; border:1px solid #740; }
  .badge.lic { background:#10331f; color:#5e9; border:1px solid #363; }
  .pidwrap { font-size:12px; color:var(--mut); }
  .pid { font-size:19px; font-weight:700; letter-spacing:1.5px; color:#fff; user-select:all; cursor:pointer; padding:1px 6px; border-radius:5px; background:#0b0b0f; border:1px solid var(--edge); }
  .pid:hover { border-color:var(--accent); }
  .badge.err { background:#3a1414; color:#f77; border:1px solid #833; }
  .plink { margin:-4px 0 10px; font-size:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .plink a { color:var(--accent); text-decoration:none; }
  .plink a:hover { text-decoration:underline; }
  .errmsg { color:#f99; font-size:11px; }
  button.mini { padding:3px 8px; font-size:11px; }

  /* ---- responsive ------------------------------------------------------ */
  /* Tablet / small laptop: give the stats their own full-width row so the
     title and the Add-channel button keep the top line to themselves. */
  @media (max-width: 900px) {
    header { padding:10px 12px; gap:8px; position:static; }   /* not sticky: a wrapped header would eat the viewport */
    header .meta { font-size:11px; }
    .stats { flex-basis:100%; margin-left:0; order:3;
             flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; }
    .stats::-webkit-scrollbar { height:0; }
    main { padding:12px; gap:12px; }
  }
  /* Phone */
  @media (max-width: 520px) {
    header h1 { font-size:15px; }
    header .meta { flex-basis:100%; order:2; }                /* meta on its own line */
    header button { margin-left:auto; padding:7px 10px; font-size:12px; }
    .pill { font-size:11px; padding:2px 8px; }
    main { padding:10px; gap:10px; }
    .card { padding:12px; }
    .pid { font-size:17px; letter-spacing:1px; }
    .btns { gap:5px; } .btns button { flex:1 1 auto; }
    .plink { font-size:11px; }
  }
  .preview { width:100%; border-radius:6px; border:1px solid var(--edge); background:#000; display:block; aspect-ratio:16/9; object-fit:contain; margin-bottom:10px; }
  label { display:block; font-size:11px; color:var(--mut); margin:8px 0 3px; }
  input[type=text],input[type=number],select { width:100%; padding:7px 9px; background:#0b0b0f; border:1px solid var(--edge); border-radius:6px; color:var(--fg); font-size:13px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; } .row>*{ flex:1 1 130px; min-width:0; }
  button { padding:7px 11px; background:#2a2a34; color:var(--fg); border:1px solid var(--edge); border-radius:6px; cursor:pointer; font-size:12px; }
  button:hover { background:#33333f; }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.danger { background:#3a2020; border-color:#663; color:#e99; }
  .btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .chk { display:flex; align-items:center; gap:7px; margin-top:10px; } .chk input{ width:auto; }
  .msg { min-height:15px; font-size:11px; color:var(--ok); margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>webcg-ndi</h1>
  <span class="meta" id="meta"></span>
  <span class="stats" id="sys"></span>
  <button class="primary" onclick="addChannel()">+ Add channel</button>
</header>
<main id="grid"></main>

<script>
let statusCache = [];
async function refresh() {
  try {
    const s = await (await fetch('status')).json();
    document.getElementById('meta').textContent = s.machineName + '  ·  gl=' + s.gl + '  ·  ' + s.channels.length + ' channel(s)';
    const sy = s.system || {}, pills = [];
    pills.push(`<span class="pill">CPU <b>${sy.cpuPercent || 0}%</b> (~${((sy.cpuPercent || 0) / 100).toFixed(1)} cores)</span>`);
    pills.push(`<span class="pill">MEM <b>${sy.memMB || 0}</b> MB</span>`);
    for (const g of (sy.gpus || [])) pills.push(`<span class="pill">GPU${g.index} <b>${g.util}%</b> ${(g.memUsed / 1024).toFixed(1)}/${(g.memTotal / 1024).toFixed(0)}GB</span>`);
    const net = sy.net || {}, ndiT = sy.ndiTotalMbps || 0, pct = ndiT / 10000 * 100;
    pills.push(`<span class="pill" style="border-color:${pct>70?'#e74':'#333'}">NDI out <b>${ndiT}</b> Mbps · ${pct.toFixed(1)}% of 10G</span>`);
    const topIf = (net.ifaces || [])[0];
    pills.push(`<span class="pill">NIC${topIf ? ' ' + topIf.name : ''} ↑ <b>${(net.txMbps || 0).toFixed(0)}</b> ↓ ${(net.rxMbps || 0).toFixed(0)} Mbps</span>`);
    document.getElementById('sys').innerHTML = pills.join('');
    statusCache = s.channels;
    render(s);
  } catch (e) {}
}
function render(s) {
  const grid = document.getElementById('grid');
  // remove cards for deleted channels
  [...grid.children].forEach(c => { if (!s.channels.find(ch => ch.id === c.dataset.id)) c.remove(); });
  for (const ch of s.channels) {
    let card = grid.querySelector('[data-id="' + ch.id + '"]');
    if (!card) { card = buildCard(ch); grid.appendChild(card); }
    updateCard(card, ch);
  }
}
function buildCard(ch) {
  const c = document.createElement('div'); c.className = 'card'; c.dataset.id = ch.id;
  c.innerHTML = `
    <h2><span class="dot"></span> <span class="nm"></span> <span style="color:var(--mut);font-weight:400">(${ch.id})</span></h2>
    <div class="sub"></div>
    <div class="pstat"></div>
    <div class="plink"></div>
    <img class="preview" alt="preview">
    <label>Source URL (live)</label>
    <input type="text" class="f_url">
    <div class="btns"><button class="primary" data-a="url">Set URL</button><button data-a="reload">Reload</button><button data-a="clickcenter" title="inject a real mouse click at frame centre">Click centre</button></div>
    <div class="row" style="margin-top:8px">
      <div><label>Resolution</label><select class="f_res">
        <option value="1280x720">720p (1280×720)</option>
        <option value="1920x1080">1080p (1920×1080)</option>
        <option value="2560x1440">1440p (2560×1440)</option>
        <option value="3840x2160">4K (3840×2160)</option>
        <option value="custom">Custom…</option>
      </select></div>
      <div><label>Frame rate</label><select class="f_fps">
        <option value="24">24 fps</option>
        <option value="25">25 fps</option>
        <option value="30">30 fps</option>
        <option value="50">50 fps</option>
        <option value="60">60 fps</option>
      </select></div>
    </div>
    <div class="customres row" style="display:none; margin-top:6px">
      <div><label>Custom width</label><input type="number" class="f_cw" min="16" max="7680" step="2"></div>
      <div><label>Custom height</label><input type="number" class="f_ch" min="16" max="4320" step="2"></div>
    </div>
    <label>NDI name</label><input type="text" class="f_name">
    <div class="chk"><input type="checkbox" class="f_alpha"><label style="margin:0">Alpha (fill+key)</label></div>
    <div class="btns"><button class="primary" data-a="config">Apply &amp; restart</button><button class="danger" data-a="delete">Delete</button></div>
    <div class="msg"></div>`;
  const id = ch.id, msg = c.querySelector('.msg');
  const val = s => c.querySelector(s).value;
  c.querySelector('[data-a="url"]').onclick = async () => { await post('channels/'+id+'/url', {url: val('.f_url')}); msg.textContent='URL set.'; };
  c.querySelector('[data-a="reload"]').onclick = async () => { await post('channels/'+id+'/reload'); msg.textContent='reloaded.'; };
  c.querySelector('[data-a="clickcenter"]').onclick = async () => { await post('channels/'+id+'/input', {type:'click'}); msg.textContent='clicked centre.'; };
  const resSel = c.querySelector('.f_res'), crow = c.querySelector('.customres');
  resSel.onchange = () => { crow.style.display = resSel.value === 'custom' ? '' : 'none'; };
  c.querySelector('[data-a="config"]').onclick = async () => {
    let w, h;
    if (resSel.value === 'custom') { w = +c.querySelector('.f_cw').value; h = +c.querySelector('.f_ch').value; }
    else { [w, h] = resSel.value.split('x').map(Number); }
    if (!w || !h || w < 16 || h < 16) { msg.className='err'; msg.textContent='enter a valid custom size'; return; }
    msg.className=''; msg.textContent='restarting…';
    await post('channels/'+id, { width:w, height:h, fps:+c.querySelector('.f_fps').value, name:val('.f_name'), alpha:c.querySelector('.f_alpha').checked });
    msg.textContent='applied.';
  };
  c.querySelector('[data-a="delete"]').onclick = async () => { if (confirm('Delete '+id+'?')) { await post('channels/'+id+'/delete'); c.remove(); } };
  return c;
}
function updateCard(c, ch) {
  c.querySelector('.dot').classList.toggle('on', ch.connected);
  c.querySelector('.nm').textContent = ch.name;
  const recv = (ch.conn === null || ch.conn === undefined) ? '?' : ch.conn;
  const bw = (ch.conn > 0)
    ? `${recv} receiver${ch.conn === 1 ? '' : 's'} · ≈${ch.ndiPerStreamMbps} Mbps ea → ${ch.ndiOutMbps} Mbps`
    : `${recv} receivers · 0 Mbps (idle, ≈${ch.ndiPerStreamMbps} Mbps if watched)`;
  const t = ch.tally || {};
  const tallyTag = t.program ? '<span style="color:#f55">● PGM</span>' : (t.preview ? '<span style="color:#5c5">● PVW</span>' : '');
  const throttled = ch.targetFps && ch.targetFps < ch.fps ? ` <span style="color:var(--mut)">(adaptive ${ch.targetFps})</span>` : '';
  c.querySelector('.sub').innerHTML = ch.width + '×' + ch.height + '@' + ch.fps + '  ·  NDI ' + ch.fpsSent + ' fps' + throttled + '  ·  ' + (ch.alpha?'alpha':'opaque') + ' ' + tallyTag
    + '<br><span style="color:' + (ch.conn > 0 ? 'var(--accent)' : 'var(--mut)') + '">NDI: ' + bw + '</span>';
  const p = ch.page || {}, ps = c.querySelector('.pstat'), pl = c.querySelector('.plink');
  let origin = p.origin || '';
  if (!origin) { try { origin = new URL(ch.url).origin; } catch (e) { origin = ''; } }
  const st = p.state;
  if (st === 'blocked') {
    const bid = (p.blocked && p.blocked.id) || p.playerId || '';
    ps.innerHTML = '<span class="badge err">Blocked</span><span class="pidwrap">' + ((p.blocked && p.blocked.title) || 'Error') + '</span>'
                 + (bid ? '<span class="pid" title="click to copy">' + bid + '</span>' : '');
    pl.innerHTML = '<span class="errmsg">ID already in use in another browser</span>'
                 + '<button class="mini" data-c="retry connection">Retry connection</button>'
                 + '<button class="mini" data-c="start as unlicensed">Start as unlicensed</button>';
  } else if (st === 'licensed' && p.playerId) {
    const url = origin + '/library?id=' + encodeURIComponent(p.playerId);
    ps.innerHTML = '<span class="badge lic">Licensed</span>' + (p.playerName ? '<span class="pidwrap">' + p.playerName + '</span>' : '')
                 + '<span class="pid" title="click to copy">' + p.playerId + '</span>';
    pl.innerHTML = '<a href="' + url + '" target="_blank" rel="noreferrer">Open library →</a><button class="mini" data-copy="' + url + '">copy link</button>';
  } else if (st === 'unlicensed' && p.playerId) {
    const url = origin + '/player-admin/setup/' + encodeURIComponent(p.playerId);
    ps.innerHTML = '<span class="badge unlic">Unlicensed</span><span class="pidwrap">Player</span>'
                 + '<span class="pid" title="click to copy">' + p.playerId + '</span>';
    pl.innerHTML = '<a href="' + url + '" target="_blank" rel="noreferrer">Register player →</a><button class="mini" data-copy="' + url + '">copy link</button>';
  } else if (st === 'connecting') {
    ps.innerHTML = '<span class="badge">Connecting…</span>'
                 + (p.playerId ? '<span class="pidwrap">pending</span><span class="pid" title="click to copy">' + p.playerId + '</span>' : '');
    pl.innerHTML = '<span class="errmsg" style="color:var(--mut)">not paired yet — waiting for the player to connect</span>';
  } else { ps.innerHTML = ''; pl.innerHTML = ''; }
  const pidEl = ps.querySelector('.pid');
  if (pidEl) pidEl.onclick = () => copyText(pidEl.textContent, pidEl);
  pl.querySelectorAll('[data-copy]').forEach(b => { b.onclick = () => copyText(b.dataset.copy, b, 'copy link'); });
  pl.querySelectorAll('[data-c]').forEach(b => { b.onclick = async () => {
    const o = b.textContent; b.textContent = '…';
    const r = await fetch('channels/' + ch.id + '/click', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ label: b.dataset.c }) });
    let j = {}; try { j = await r.json(); } catch (e) {}
    b.textContent = j.clicked ? 'clicked' : 'not found'; setTimeout(() => b.textContent = o, 1200);
  }; });
  const a = document.activeElement, has = s => c.contains(a) && a.classList.contains(s.slice(1));
  if (!has('.f_url'))  c.querySelector('.f_url').value = ch.url;
  const rs = c.querySelector('.f_res');
  if (rs.value !== 'custom') {           // leave the picker alone while a custom size is being entered
    if (!has('.f_res')) setSelect(rs, ch.width + 'x' + ch.height, ch.width + '×' + ch.height + ' (custom)');
    if (!has('.f_cw')) c.querySelector('.f_cw').value = ch.width;
    if (!has('.f_ch')) c.querySelector('.f_ch').value = ch.height;
  }
  if (!has('.f_fps'))  setSelect(c.querySelector('.f_fps'), String(ch.fps), ch.fps + ' fps (custom)');
  if (!has('.f_name')) c.querySelector('.f_name').value = ch.name;
  if (a !== c.querySelector('.f_alpha')) c.querySelector('.f_alpha').checked = ch.alpha;
  c.querySelector('.preview').src = 'preview.jpg?id=' + ch.id + '&t=' + Date.now();
}
async function post(path, body) {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{}) });
  return r.ok;
}
function copyText(v, el, restore) {
  const orig = restore || v;
  const done = () => { el.textContent = 'copied'; setTimeout(() => el.textContent = orig, 900); };
  if (navigator.clipboard) navigator.clipboard.writeText(v).then(done).catch(() => {});
  else { const ta = document.createElement('textarea'); ta.value = v; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); done(); } catch (e) {} ta.remove(); }
}
function setSelect(sel, value, customLabel) {
  if (![...sel.options].some(o => o.value === value)) {
    const o = document.createElement('option'); o.value = value; o.textContent = customLabel || value; sel.appendChild(o);
  }
  sel.value = value;
}
async function addChannel() {
  const url = prompt('Page URL for the new channel:', 'https://example.com');
  if (!url) return;
  const name = prompt('NDI name:', 'WebCG-' + (statusCache.length + 1));
  if (!name) return;
  await post('channels', { url, name, width:1920, height:1080, fps:30, alpha:true });
  refresh();
}
setInterval(refresh, 2000); refresh();
</script>
</body>
</html>
