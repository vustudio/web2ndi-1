services:
  webcg-ndi:
    build: .
    image: webcg-ndi:latest
    container_name: webcg-ndi
    init: true                  # Chromium needs a real init (PID 1) to reap its child processes
    shm_size: "1gb"             # Chromium crashes on the default 64MB /dev/shm rendering heavy pages
    network_mode: host          # NDI discovery must sit on the LAN to be seen by other NDI apps
    environment:
      CG_URL: "https://rnd2.vu.studio/player?wallid=sienna"
      CG_WIDTH: "1920"
      CG_HEIGHT: "1080"
      CG_FPS: "60"
      NDI_NAME: "WebCG"
      CG_ALPHA: "1"
      CG_GL: "egl"              # set to 'swiftshader' on a host with no GPU
      CTRL_PORT: "8099"         # web control panel: http://<host>:8099/
      # NDI discovery: leave unset to use mDNS (fine when this is the only NDI app
      # on the host). On a host already running NDI apps, point at a discovery
      # server (unicast :5959) so the source is reliably seen:
      # NDI_DISCOVERY_SERVER: "10.201.10.10"
      # NDI_GROUP: "public"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
